name: smoke

# Run on PRs and pushes to main. For PRs from forks, secrets are not
# available — the job gates on head-repo match and skips cleanly.
on:
  pull_request:
  push:
    branches: [main]

# Avoid redundant runs on rapid commits.
concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: smoke only needs to read the repo source. It doesn't
# write commit statuses, write packages, or touch deployments.
permissions:
  contents: read

jobs:
  # The live smoke stack requires OPENAI_API_KEY. When it's absent — fork PRs, or
  # a same-repo PR/push on a repo without the Actions secret configured — the E2E
  # cannot boot. This guard lets `smoke` SKIP CLEANLY (shown as "skipped", not a
  # red failure) rather than hard-failing at the first OpenAI call. Only a boolean
  # is emitted here; the secret value is never exposed. (Completes the fork-skip
  # intent above: previously only fork PRs skipped, so same-repo branches without
  # the secret went red instead of skipping.)
  guard:
    name: secret presence
    runs-on: ubuntu-latest
    outputs:
      has_secret: ${{ steps.check.outputs.has_secret }}
    steps:
      - id: check
        run: echo "has_secret=${{ secrets.OPENAI_API_KEY != '' }}" >> "$GITHUB_OUTPUT"

  smoke:
    name: build + smoke
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Skip on fork PRs (no secrets) AND when OPENAI_API_KEY is absent on a
    # same-repo PR/push — the live stack can't boot without it, so skip cleanly
    # instead of failing red. Fork/secret-less contributors run smoke locally.
    if: >-
      needs.guard.outputs.has_secret == 'true' && (
        github.event_name == 'push' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )

    # v1.0 W1.4 — UM_IMAGE pinned at the job level so every docker
    # compose call in this job (install.sh's _compose wrapper AND
    # direct invocations in later steps like the rate-limit reconfig)
    # resolves to the same locally-built image. UM_BUILD_LOCAL=1 on
    # the install step triggers the build via docker-compose.build.yml,
    # which tags the output as `universal-memory-server:local` —
    # matching this UM_IMAGE value. Without this pin, direct compose
    # calls would resolve to the GHCR pull-default and 401 (image is
    # private until the repo flips public).
    #
    # Post-public-flip: this can flip to a specific released tag
    # (e.g. UM_IMAGE: ghcr.io/goldenwo/universal-memory-server:1.0.0)
    # to exercise the pull path in CI as well.
    env:
      UM_IMAGE: universal-memory-server:local

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # v0.8 G2: forbid mem0.add() / memoryClient.add() / resolvedMemory().add()
      # / newMemory.add() reappearing in server/+cli/. Reintroducing one
      # bypasses umAdd's orchestrator-routed metric emission — the contract
      # gap v0.8 G2 closed. Cheap static check; fail-fast before the stack
      # comes up.
      - name: v0.8 G2 grep gate (no mem0.add() in server/+cli/)
        run: bash scripts/check-no-mem0-add.sh

      # install.sh in UM_NONINTERACTIVE=1 mode reads the required values
      # from env vars, fails fast if any are missing, and writes .env
      # itself. We do not pre-write .env — letting install.sh own its
      # entire code path is what we want to CI.
      #
      # UM_VAULT_DIR/UM_MOUNT_MODE/UM_MCP_WRITE_ENABLED are passed so the
      # resulting stack can exercise vault-file indexing (smoke Task 7), state
      # writes (Task 8), and MCP write tools (T10-G/H/I) end-to-end.
      #
      # UM_CONTAINER_USER pins the container process to the runner's UID:GID
      # so files it writes into the rw-mounted vault are owned by the runner
      # — otherwise T10-G cleanup fails with EACCES when the runner (1001)
      # tries to unlink container-created files owned by node (1000).
      - name: Bring up stack via install.sh
        working-directory: server
        env:
          UM_NONINTERACTIVE: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MEM0_USER_ID: ci-smoke-${{ github.run_id }}
          MEM0_MCP_PORT: "6335"
          UM_VAULT_DIR: "/tmp/um-vault-ci"
          UM_MOUNT_MODE: "rw"
          UM_MCP_WRITE_ENABLED: "true"
          # v1.0 W1.4 — CI builds from local source rather than pulling
          # from GHCR. The GHCR image is private until the repo flips
          # public; once it does, this can switch back to pull-mode by
          # removing the override (or pinning UM_VERSION to a specific
          # released tag for reproducibility). Build mode also exercises
          # the Dockerfile path itself, which is what we want to CI.
          UM_BUILD_LOCAL: "1"
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::OPENAI_API_KEY secret is not set on this repo."
            echo "::error::Add it at Settings > Secrets and variables > Actions."
            exit 1
          fi
          export UM_CONTAINER_USER="$(id -u):$(id -g)"
          echo "::notice::Container will run as UM_CONTAINER_USER=$UM_CONTAINER_USER (matches runner)"
          mkdir -p "$UM_VAULT_DIR"
          chmod 0777 "$UM_VAULT_DIR"
          bash ./install.sh

      # W6.2 patch contract — the patch fires `[mem0-patch] <pkg> not
      # installed (peer-skipped) — expected on boot per W6.2` warns at
      # module load for each peer-skipped provider. mem0ai@2.4.6 has 14
      # patched imports, of which 12 fire warns at runtime (better-sqlite3
      # ×2 succeed because the package is retained for SQLiteManager).
      # Asserting >= 12 (not = 12) so adding a future patched import in
      # a mem0 bump doesn't break this gate; CHANGELOG/Dockerfile carry
      # the canonical count. A regression to 0 = patch silently no-op'd
      # (see spec §Test strategy "Boot tier" + spec Phase 1 step 4
      # "patch-package returns success on no-op apply").
      - name: Verify W6.2 patch fired (boot-tier [mem0-patch] count >= 12)
        working-directory: server
        run: |
          set -o pipefail
          timeout 30 sh -c 'until [ "$(docker compose logs memory-server 2>&1 | grep -c "\[mem0-patch\]")" -ge 12 ]; do sleep 1; done' \
            || { echo "::error::W6.2 patch contract regressed — expected >=12 [mem0-patch] log lines within 30s, got $(docker compose logs memory-server 2>&1 | grep -c "\[mem0-patch\]")"; docker compose logs memory-server 2>&1 | tail -50; exit 1; }
          echo "[ci] W6.2 patch contract OK ($(docker compose logs memory-server 2>&1 | grep -c "\[mem0-patch\]") [mem0-patch] log lines)"

      # v0.6 (Phase C C.6/C.7): rate limiter is per-IP token bucket with
      # default 60 RPM / 10 burst. Smoke fires dozens of /api/* calls in
      # quick succession from the runner's IP — well above 60 RPM — so the
      # second-wave calls (Task 8 onward) hit 429. The limiter applies to
      # every non-loopback caller (security-symmetric loopback bypass), and
      # CI calls hit the container via Docker's NAT bridge so the source IP
      # is non-loopback.
      #
      # Override UM_RATE_LIMIT_RPM / BURST in .env and restart the server
      # service to pick up the new env. install.sh's snapshot mechanism
      # would preserve these on a re-run, but here we're appending after
      # the first install. Smoke tests the pipeline correctness; load
      # behavior is exercised elsewhere (rate-limit unit tests + perf gates).
      - name: Tune rate-limit budget + enable D3.2 auto-supersession for smoke
        working-directory: server
        run: |
          {
            echo ""
            echo "# CI smoke override — high RPM/burst so dozens of /api/*"
            echo "# calls in quick succession do not 429."
            echo "UM_RATE_LIMIT_RPM=100000"
            echo "UM_RATE_LIMIT_BURST=10000"
            echo ""
            echo "# v1.2 D3.2 — enable auto-supersession ON THE SERVER for the S5"
            echo "# smoke probe. smoke.sh runs in a separate client shell and cannot"
            echo "# set the running container's env; the server reads"
            echo "# UM_AUTOSUPERSEDE_ENABLED / _THRESHOLD from its own env at request"
            echo "# time, so they must be set here (force-recreate below re-reads"
            echo "# .env; env_file last-wins overrides the .env.example default=false)."
            echo "# The detector's eligibility gate no-ops on the no-lane checkpoints"
            echo "# other smoke tasks run, so enabling it for the whole run is safe."
            echo "UM_AUTOSUPERSEDE_ENABLED=true"
            echo "UM_AUTOSUPERSEDE_THRESHOLD=0.7"
            echo ""
            echo "# Raise the D1 embedding-dedup threshold for the run so the S5"
            echo "# auto-supersession probe's contradicting A/B (and C/D control)"
            echo "# facts — same-topic, near the 0.84 dedup threshold — stay DISTINCT instead of"
            echo "# DEDUP_MERGEing (which would collapse the pair before the contradiction"
            echo "# detector runs). Exact-dup (hash) dedup tests are unaffected; no smoke"
            echo "# test relies on a 0.84 embedding-PARAPHRASE merge (D1 S2 uses exact text)."
            echo "UM_DEDUP_EMBEDDING_THRESHOLD=0.95"
            echo ""
            echo "# mem0 Platform-compat facade — enable the flag-gated /v1/*+/v2/*"
            echo "# compat routes ON THE SERVER under test so the S9 probe"
            echo "# (UM_SMOKE_MEM0_COMPAT=1 in the smoke step below) exercises the"
            echo "# dialect end-to-end instead of skipping on the flag-off 404."
            echo "# The facade ships default-off/inert; this is the explicit CI"
            echo "# opt-in (docs/mem0-compat.md)."
            echo "UM_MEM0_COMPAT_ENABLED=true"
          } >> .env
          # `restart` reuses the existing container's env vars — does NOT
          # re-read .env. Use `up -d --force-recreate` to rebuild the
          # container with the updated env_file. qdrant is left untouched.
          docker compose up -d --force-recreate --no-deps memory-server
          timeout 60 bash -c 'until curl -sf http://localhost:6335/health >/dev/null 2>&1; do sleep 1; done'
          echo "[ci] server back up after rate-limit reconfig"

      # install.sh only brings up the container stack; host node_modules
      # isn't populated, so unit tests run on the host need a separate npm ci.
      - name: Install host node deps for unit tests
        working-directory: server
        run: npm ci

      # W6.2: apply mem0ai patch on host so unit tests that import mem0
      # exercise the same dynamic-import shape as the production image.
      # The Dockerfile applies it during image build; this mirrors that
      # for the host-test path. Spec anti-goal forbids `postinstall:
      # patch-package` (which would auto-patch on every npm install);
      # we invoke explicitly via a CI step instead.
      - name: Apply mem0ai patch on host (W6.2 parity)
        working-directory: server
        run: npx patch-package

      - name: Run server unit tests
        working-directory: server
        # Unquoted glob so bash expands test/*.test.mjs into a file list.
        # node --test treats quoted "test/*.test.mjs" as a literal path and fails.
        #
        # v0.8 G2: UM_QDRANT_INTEGRATION=1 un-skips test/add-stamp-roundtrip.test.mjs
        # which exercises the full DE5 stamp roundtrip (writeStamp via umAdd →
        # readStamp via mem0.getAll) against the real compose-managed qdrant
        # using UM_TEST_MOCK_SDK=1 internally — no API keys needed. Closes the
        # spec §8 "DE5 stamp roundtrip in boot-smoke" acceptance gap that T24
        # left as documented-gap (mock-SDK boot intentionally skips writeStamp).
        env:
          UM_QDRANT_INTEGRATION: "1"
          QDRANT_HOST: localhost
          QDRANT_PORT: "6333"
        run: node --test test/*.test.mjs

      # Full smoke — install step mounted /tmp/um-vault-ci rw and enabled MCP
      # writes, so Task 7 (reindex vault files), Task 8 (state writes), and
      # T10-G/H/I (MCP write tools) all run end-to-end on the live stack.
      # UM_VAULT_DIR is re-exported here because smoke.sh creates host-side
      # fixtures at $UM_VAULT_DIR/sessions/... that the container reads via
      # its /vault mount.
      #
      # umask 000 so host-created fixture dirs under $UM_VAULT_DIR are 0777
      # and the container's node user (UID 1000) can create its own subdirs
      # (e.g. /vault/state/t10e for memory_checkpoint writes). Without this,
      # runner-owned 0755 state/ dir blocks container mkdir with EACCES.
      # v0.6 follow-up: set docker-compose user: to match host UID so this
      # cross-user write pattern isn't needed.
      - name: Run smoke test
        working-directory: server
        env:
          UM_MCP_WRITE_ENABLED: "true"
          UM_VAULT_DIR: "/tmp/um-vault-ci"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # v1.1 D1 flag-flip — UM_DEDUP_ENABLED defaults to true via the
          # new .env.example, so install.sh writes it to .env and the
          # container starts with dedup ON. UM_SMOKE_DEDUP_ON=1 here is the
          # explicit opt-in that fires the S2 dedup probe (two identical
          # /api/add writes; second must return event=DEDUP_MERGED).
          UM_SMOKE_DEDUP_ON: "1"
          # v1.1 B2 — UM_SMOKE_REMEMBER_ON=1 fires the S3 /remember helper
          # round-trip (two identical /remember calls via the bash helper;
          # second must surface "dedup match" in helper output). Builds on
          # UM_DEDUP_ENABLED=true above — disabling dedup would silently
          # make this probe a no-op (both writes succeed without merging),
          # so S3 is dependent on D1 being ON.
          UM_SMOKE_REMEMBER_ON: "1"
          # v1.1 D2 — UM_SMOKE_D2_ON=1 fires the S4 lane-partition probe
          # (three /api/add writes: same text+userId, lane=work / lane=
          # personal / no-lane). Asserts the two lane writes land as two
          # distinct filterable records (NOT dedup-merged) and the no-lane
          # write forms its own legacy partition. Depends on UM_DEDUP_ENABLED
          # =true above: with dedup OFF every write is a plain ADD and the
          # anti-merge assertion can no longer regress-detect a stripped-lane
          # D2 cascade — so S4, like S3, is dependent on D1 being ON.
          UM_SMOKE_D2_ON: "1"
          # v1.2 D3.2 — UM_SMOKE_AUTOSUPERSEDE_ON=1 fires the S5 auto-
          # supersession probe: write contradicting A/B in lane:work, run
          # checkpoint lane:work (UM_AUTOSUPERSEDE_ENABLED=true set within the
          # block), assert A superseded + B current, verify include_superseded
          # / only_superseded filters, restore via unsupersede, and check both
          # cross-partition (lane:other) and absence-gate (no-lane R1-B1)
          # controls. Requires UM_MCP_WRITE_ENABLED=true + UM_VAULT_DIR (set
          # above) + a real LLM key (OPENAI_API_KEY above).
          UM_SMOKE_AUTOSUPERSEDE_ON: "1"
          # v1.3 Gap-5 P4 — UM_SMOKE_LANE_ON=1 fires the S6 lane-classifier
          # auto-population probe: two /api/add writes with NO metadata.lane.
          # Asserts the work-flavored fact is auto-routed to lane:work and the
          # off-taxonomy noise fact abstains (stored unpartitioned, absent from
          # every lane filter). NO .env reconfig — the classifier is ON BY DEFAULT
          # post-flip (UM_LANE_CLASSIFIER_ENABLED opt-out), so the probe proves the
          # v1.3 DEFAULT. Needs the bundled taxonomy (shipped via the Dockerfile
          # `COPY config/`) + OPENAI_API_KEY on the server (above) for the exemplar
          # + fact embeds. Unlike S3/S4/S5 it does not depend on UM_DEDUP_ENABLED.
          UM_SMOKE_LANE_ON: "1"
          # Gap-3 OAuth PR-5 — UM_SMOKE_OAUTH=1 activates the S7 live OAuth flow
          # probe gate in smoke.sh. This default stack ships UM_OAUTH_ENABLED OFF
          # (OAuth is opt-in per spec §0), so the S7 block's discovery pre-check
          # gets a 404 and SKIPS cleanly with an explicit "[smoke] OAuth probe:
          # server has OAuth disabled … skipping" line — CI stays green while the
          # gate wiring is exercised and visible in the logs. The moment this
          # stack is brought up OAuth-enabled (UM_OAUTH_ENABLED=true +
          # UM_PUBLIC_BASE_URL set), the probe auto-runs the full flow.
          #
          # FOLLOW-UP (deliberately NOT wired here): making CI actually EXERCISE
          # (not skip) the full flow needs an OAuth-enabled boot — either flipping
          # this shared container's flag (which would change /mcp's 401 envelope
          # + endpoint-class routing for every later step, e.g. the continuity
          # test) or standing up a second short-lived OAuth-enabled instance with
          # its own teardown. Both are larger than a one-line env add, so per the
          # "don't half-wire" discipline they're left as a follow-up; the probe is
          # proven locally against an OAuth-enabled boot (PR-5 verification).
          UM_SMOKE_OAUTH: "1"
          # Tier-2 #9 — UM_SMOKE_XSURFACE=1 fires the S8 cross-surface recall
          # probe: write a uniquely-marked fact via REST POST /api/add, then
          # assert it is recallable via MCP memory_search (POST /mcp JSON-RPC) —
          # proving the "any vendor/surface" round-trip end-to-end over two
          # distinct transports. No write-mode required (REST /api/add is not
          # UM_MCP_WRITE_ENABLED-gated; memory_search is a read tool), and this
          # stack already runs writes-enabled above anyway. Self-cleaning (DELETE)
          # so the 5/5 baseline-preservation check stays green.
          UM_SMOKE_XSURFACE: "1"
          # mem0-compat — UM_SMOKE_MEM0_COMPAT=1 fires the S9 Platform-dialect
          # round-trip probe: R2 add (infer:false verbatim path, Token-scheme
          # auth) → R3 search (mem0 record shape: id + memory) → R5 get (the
          # one Bearer-scheme positive check — both schemes accepted) → R7
          # delete → post-delete search-gone, plus wrong-key 401 negatives
          # under both schemes. Requires UM_MEM0_COMPAT_ENABLED=true ON THE
          # SERVER — appended to .env in the reconfig step above (the facade
          # ships default-off/inert; against a flag-off stack S9 skips cleanly
          # on the /v1/ping/ 404). Self-cleaning via the compat R7 DELETE.
          UM_SMOKE_MEM0_COMPAT: "1"
          # #159 T9 — UM_SMOKE_REMOTE_RT=1 fires the S10 remote round-trip
          # probe: append-turn ×2 (X-UM-Source header) → capture.turn counters
          # row read via `docker exec node -e` from the container's
          # um-counters.db (spec §6 surface attribution) → /api/checkpoint →
          # GET /api/state/<project> shows the synthesized state →
          # capture.checkpoint counters row. The checkpoint leg calls the real
          # summarizer (OPENAI_API_KEY above); a keyless local rig can set
          # UM_SMOKE_REMOTE_RT_LLM=0 to run only the append-turn+counters
          # legs. Requires UM_MCP_WRITE_ENABLED=true (set above) — against a
          # writes-off stack S10 skips cleanly on the 403.
          #
          # #171 Stage-A A6 — the stats + alert legs (S10 legs 4/5) ride the
          # same gate: GET /api/stats must show the smoke-s10 surface fresh
          # (freshness_hours == 0, >= 2 capture events) + recall/corpus
          # sections, then bin/um-alert.sh must exit 0 on the fresh surface
          # and 1 on a never-captured one. No extra env: the legs need only
          # this flag + the bearer token install.sh already wrote to .env
          # (/api/stats vetoes the loopback no-auth bypass, so the token is
          # load-bearing here — legs skip cleanly on a tokenless stack).
          UM_SMOKE_REMOTE_RT: "1"
          # v0.8: G2.5 mocked-SDK boot tests now isolated by per-provider
          # QDRANT_COLLECTION (boot_smoke_<provider>), so each boot lands its
          # DE5 stamp in its own collection — no stamp-mismatch when switching
          # providers across boots. UM_SKIP_BOOT_SMOKE remains the dev-side
          # escape hatch for running smoke without docker.
        run: |
          umask 000
          bash ./test/smoke.sh

      # smoke.sh's 6/6 mocked-SDK boot gate ends with `docker compose down`
      # (its per-provider boot stacks share the compose project name), which
      # takes the MAIN stack down too — so from here the server is GONE. The
      # pre-#159 continuity test never noticed: its pipeline was client-side
      # and its only server call was a soft check. The v2 live leg drives the
      # real capture hooks against the real server, so bring the stack back
      # up first. Plain `docker compose up -d` reuses the .env install.sh
      # wrote (auth token, OPENAI_API_KEY, CI rate-limit overrides) and the
      # persisted qdrant volume; UM_CONTAINER_USER is re-exported to match
      # the original bring-up (vault file ownership, see the install step).
      - name: Restore server stack for continuity tests
        working-directory: server
        run: |
          export UM_CONTAINER_USER="$(id -u):$(id -g)"
          docker compose up -d
          for i in $(seq 1 60); do
            curl -sf --max-time 2 http://localhost:6335/health >/dev/null && break
            sleep 1
          done
          curl -sf --max-time 2 http://localhost:6335/health >/dev/null || {
            echo "::error::server did not come back up for the continuity tests"
            docker compose logs memory-server 2>&1 | tail -50
            exit 1
          }
          echo "[ci] server stack restored for continuity tests"

      # Continuity pipeline test — runs BOTH mock + live modes so a mock-
      # scaffold regression (canned-response shape, JSON parsing, etc.) is
      # caught fast and cheap, before the live OpenAI run validates the
      # real API path. v0.6 R3 caught that mock-mode wasn't being exercised
      # in CI; this fix closes that gap.
      - name: Run continuity test (mock mode)
        working-directory: server
        env:
          UM_CONTINUITY_LIVE: "0"
          UM_ENDPOINT: http://localhost:6335
        run: bash ./test/continuity.sh

      # Live mode uses UM_CONTINUITY_LIVE=1 so the OpenAI summarizer path
      # runs for real. Adds ~1¢/run of API cost on top of mock — worth the
      # cross-section coverage of state.md round-trip with real LLM output
      # variability. See issue #7.
      - name: Run continuity test (live OpenAI)
        working-directory: server
        env:
          UM_CONTINUITY_LIVE: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UM_ENDPOINT: http://localhost:6335
        run: bash ./test/continuity.sh

      - name: Dump logs on failure
        if: failure()
        working-directory: server
        run: |
          echo "::group::memory-server logs"
          docker compose logs memory-server || true
          echo "::endgroup::"
          echo "::group::qdrant logs"
          docker compose logs qdrant || true
          echo "::endgroup::"

      - name: Teardown
        if: always()
        working-directory: server
        run: docker compose down --volumes || true

  # #159 T9 — plugin hook + hook-lib test suites, EXECUTED (not just
  # shellchecked). The arc's motivating failure was silent capture death:
  # hooks that pass shellcheck but break at runtime. These suites are pure
  # local-stub tests (isolated HOME + MOCK_BIN curl stubs — no network, no
  # secrets), so the job runs unconditionally, including on fork PRs.
  # ubuntu-latest ships bash + python3 + python3-yaml (frontmatter.sh needs
  # pyyaml — same preinstall the installer-test job's comment relies on).
  # Loop aggregates failures so one broken suite doesn't hide another.
  hook-tests:
    name: Plugin hook tests (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run hooks/*.test.sh + hooks/lib/*.test.sh
        run: |
          set -u
          rc=0
          for t in plugins/claude-code/universal-memory/hooks/*.test.sh \
                   plugins/claude-code/universal-memory/hooks/lib/*.test.sh; do
            echo "::group::$t"
            if bash "$t"; then
              echo "PASS: $t"
            else
              echo "::error::FAIL: $t"
              rc=1
            fi
            echo "::endgroup::"
          done
          exit "$rc"

  installer-test:
    name: Installer cross-platform (${{ matrix.os }})
    needs: [guard, smoke]
    # Mirror the smoke job's gate explicitly (skip on fork PRs AND when the secret is
    # absent) rather than relying solely on needs:[smoke] skip-propagation.
    if: >-
      needs.guard.outputs.has_secret == 'true' && (
        github.event_name == 'push' ||
        github.event.pull_request.head.repo.full_name == github.repository
      )
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # Run with default severity (style+), -x (follow `# shellcheck source=`
      # directives so SC1091 doesn't fire on dynamically-sourced libs), and
      # -P SCRIPTDIR (resolve relative source paths against each script's own
      # directory rather than CWD — needed because plugin CLIs source libs via
      # paths relative to themselves). Issue #23 closed the residual info/style
      # findings (real fixes wherever the change was small, narrow inline
      # disables only at deliberate-literal sites). Each disable carries a
      # one-line justification — every finding left is either a real fix or
      # an explicitly-explained false positive.
      - name: Run shellcheck
        run: |
          sudo apt-get install -y shellcheck 2>/dev/null || brew install shellcheck
          shellcheck -x -P SCRIPTDIR \
                     installer/*.sh installer/lib/*.sh \
                     plugins/claude-code/universal-memory/bin/um \
                     plugins/claude-code/universal-memory/bin/um-capture \
                     plugins/claude-code/universal-memory/bin/um-forget \
                     plugins/claude-code/universal-memory/bin/um-preview \
                     plugins/claude-code/universal-memory/bin/um-supersede \
                     plugins/claude-code/universal-memory/bin/um-tunnel \
                     plugins/claude-code/universal-memory/bin/um-alert.sh \
                     plugins/claude-code/universal-memory/bin/um-alert.test.sh \
                     plugins/claude-code/universal-memory/hooks/*.sh \
                     plugins/claude-code/universal-memory/hooks/lib/*.sh \
                     plugins/claude-code/universal-memory/skills/create-adr/create-adr.sh \
                     plugins/claude-code/universal-memory/skills/create-adr/create-adr.test.sh \
                     plugins/claude-code/universal-memory/skills/create-remember/create-remember.sh \
                     plugins/claude-code/universal-memory/skills/create-remember/create-remember.test.sh
      # macOS runners don't ship pyyaml; install-cli.sh preflight checks for it.
      # ubuntu-latest has python3-yaml out of the box; skip on Linux.
      - name: Ensure pyyaml (macOS)
        if: matrix.os == 'macos-latest'
        run: pip3 install --break-system-packages pyyaml 2>/dev/null || pip3 install pyyaml
      # Sandbox tests first
      - run: bash installer/install-cli.test.sh
      - run: bash server/install.test.sh
      # install-token.test.sh exercises the v0.6 token-generation +
      # preservation contract (B.4) plus the v0.6-key snapshot at
      # install.sh:585-602. v0.6 R3 caught that this script was being
      # shellchecked but never run end-to-end — closing that gap here.
      - run: bash installer/install-token.test.sh
      # install-plugin-cc.test.sh covers the standalone Claude Code plugin
      # installer, including T17's v0.4-class stale-symlink-replacement
      # regression guard (issue #22). Was previously shellchecked but never
      # executed in CI — same gap class as install-token.test.sh in v0.6 R3.
      - run: bash installer/install-plugin-cc.test.sh
      # install-plugin-codex.test.sh covers the Codex CLI plugin installer
      # (T13 detection + T19 absence path). Companion to install-plugin-cc;
      # was the second half of the same shellchecked-but-unrun gap. Wired
      # in as a follow-up to PR #39's installer-cc wire-up.
      - run: bash installer/install-plugin-codex.test.sh
      # install-remote.test.sh covers the #159 T7 remote-client flow
      # (install.sh --remote): the um_verify_endpoint probe taxonomy plus the
      # dead-endpoint / writes-disabled / server-too-old / live-loopback /
      # orphan-warning / marker-vs-shadowing exit criteria. Stubbed curl —
      # no network.
      - run: bash installer/install-remote.test.sh
      # create-adr.test.sh covers the v1.1 W1.1 /adr skill bash helper
      # (sanitization, slug, auto-numbering, self-application guard, payload
      # shape, 401 warn-only/loud-fail asymmetry, sync semantics). Stub HTTP
      # server via python3 (already on both ubuntu and macos runners).
      - run: bash plugins/claude-code/universal-memory/skills/create-adr/create-adr.test.sh
      # um-tunnel.test.sh covers the tunnel-onboarding CLI (URL extraction,
      # trailing-slash join normalization, three-tier write-mode detection
      # via stubbed curl/cloudflared/tailscale). Was shellchecked but never
      # executed in CI — same gap class as install-token.test.sh in v0.6 R3.
      - run: bash plugins/claude-code/universal-memory/bin/um-tunnel.test.sh
      # um-alert.test.sh covers the #171 Stage-A capture-freshness check's
      # exit taxonomy (0 fresh / 1 stale / 2 check-couldn't-run) against a
      # stubbed curl — pure local MOCK_BIN, no network. Wired explicitly:
      # nothing here is glob-covered (plan U3 audit).
      - run: bash plugins/claude-code/universal-memory/bin/um-alert.test.sh
      # Real-install leg — validates end-to-end
      - name: Real install + um --version sanity
        run: |
          bash installer/install-cli.sh --yes
          export PATH="$HOME/.local/bin:$PATH"
          which um
          um --version
        env:
          HOME: ${{ runner.temp }}/um-real-install
