name: smoke

# Run on PRs and pushes to main. For PRs from forks, secrets are not
# available — the job gates on head-repo match and skips cleanly.
on:
  pull_request:
  push:
    branches: [main]

# Avoid redundant runs on rapid commits.
concurrency:
  group: smoke-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege: smoke only needs to read the repo source. It doesn't
# write commit statuses, write packages, or touch deployments.
permissions:
  contents: read

jobs:
  smoke:
    name: build + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Skip on fork PRs: secrets aren't available and the test would
    # fail at the first OpenAI call. Fork contributors can run the
    # same test locally before pushing.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # v0.8 G2: forbid mem0.add() / memoryClient.add() / resolvedMemory().add()
      # / newMemory.add() reappearing in server/+cli/. Reintroducing one
      # bypasses umAdd's orchestrator-routed metric emission — the contract
      # gap v0.8 G2 closed. Cheap static check; fail-fast before the stack
      # comes up.
      - name: v0.8 G2 grep gate (no mem0.add() in server/+cli/)
        run: bash scripts/check-no-mem0-add.sh

      # install.sh in UM_NONINTERACTIVE=1 mode reads the required values
      # from env vars, fails fast if any are missing, and writes .env
      # itself. We do not pre-write .env — letting install.sh own its
      # entire code path is what we want to CI.
      #
      # UM_VAULT_DIR/UM_MOUNT_MODE/UM_MCP_WRITE_ENABLED are passed so the
      # resulting stack can exercise vault-file indexing (smoke Task 7), state
      # writes (Task 8), and MCP write tools (T10-G/H/I) end-to-end.
      #
      # UM_CONTAINER_USER pins the container process to the runner's UID:GID
      # so files it writes into the rw-mounted vault are owned by the runner
      # — otherwise T10-G cleanup fails with EACCES when the runner (1001)
      # tries to unlink container-created files owned by node (1000).
      - name: Bring up stack via install.sh
        working-directory: server
        env:
          UM_NONINTERACTIVE: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          MEM0_USER_ID: ci-smoke-${{ github.run_id }}
          MEM0_MCP_PORT: "6335"
          UM_VAULT_DIR: "/tmp/um-vault-ci"
          UM_MOUNT_MODE: "rw"
          UM_MCP_WRITE_ENABLED: "true"
        run: |
          if [ -z "${OPENAI_API_KEY:-}" ]; then
            echo "::error::OPENAI_API_KEY secret is not set on this repo."
            echo "::error::Add it at Settings > Secrets and variables > Actions."
            exit 1
          fi
          export UM_CONTAINER_USER="$(id -u):$(id -g)"
          echo "::notice::Container will run as UM_CONTAINER_USER=$UM_CONTAINER_USER (matches runner)"
          mkdir -p "$UM_VAULT_DIR"
          chmod 0777 "$UM_VAULT_DIR"
          bash ./install.sh

      # v0.6 (Phase C C.6/C.7): rate limiter is per-IP token bucket with
      # default 60 RPM / 10 burst. Smoke fires dozens of /api/* calls in
      # quick succession from the runner's IP — well above 60 RPM — so the
      # second-wave calls (Task 8 onward) hit 429. The limiter applies to
      # every non-loopback caller (security-symmetric loopback bypass), and
      # CI calls hit the container via Docker's NAT bridge so the source IP
      # is non-loopback.
      #
      # Override UM_RATE_LIMIT_RPM / BURST in .env and restart the server
      # service to pick up the new env. install.sh's snapshot mechanism
      # would preserve these on a re-run, but here we're appending after
      # the first install. Smoke tests the pipeline correctness; load
      # behavior is exercised elsewhere (rate-limit unit tests + perf gates).
      - name: Tune rate-limit budget for smoke
        working-directory: server
        run: |
          {
            echo ""
            echo "# CI smoke override — high RPM/burst so dozens of /api/*"
            echo "# calls in quick succession do not 429."
            echo "UM_RATE_LIMIT_RPM=100000"
            echo "UM_RATE_LIMIT_BURST=10000"
          } >> .env
          # `restart` reuses the existing container's env vars — does NOT
          # re-read .env. Use `up -d --force-recreate` to rebuild the
          # container with the updated env_file. qdrant is left untouched.
          docker compose up -d --force-recreate --no-deps memory-server
          timeout 60 bash -c 'until curl -sf http://localhost:6335/health >/dev/null 2>&1; do sleep 1; done'
          echo "[ci] server back up after rate-limit reconfig"

      # install.sh only brings up the container stack; host node_modules
      # isn't populated, so unit tests run on the host need a separate npm ci.
      - name: Install host node deps for unit tests
        working-directory: server
        run: npm ci

      - name: Run server unit tests
        working-directory: server
        # Unquoted glob so bash expands test/*.test.mjs into a file list.
        # node --test treats quoted "test/*.test.mjs" as a literal path and fails.
        #
        # v0.8 G2: UM_QDRANT_INTEGRATION=1 un-skips test/add-stamp-roundtrip.test.mjs
        # which exercises the full DE5 stamp roundtrip (writeStamp via umAdd →
        # readStamp via mem0.getAll) against the real compose-managed qdrant
        # using UM_TEST_MOCK_SDK=1 internally — no API keys needed. Closes the
        # spec §8 "DE5 stamp roundtrip in boot-smoke" acceptance gap that T24
        # left as documented-gap (mock-SDK boot intentionally skips writeStamp).
        env:
          UM_QDRANT_INTEGRATION: "1"
          QDRANT_HOST: localhost
          QDRANT_PORT: "6333"
        run: node --test test/*.test.mjs

      # Full smoke — install step mounted /tmp/um-vault-ci rw and enabled MCP
      # writes, so Task 7 (reindex vault files), Task 8 (state writes), and
      # T10-G/H/I (MCP write tools) all run end-to-end on the live stack.
      # UM_VAULT_DIR is re-exported here because smoke.sh creates host-side
      # fixtures at $UM_VAULT_DIR/sessions/... that the container reads via
      # its /vault mount.
      #
      # umask 000 so host-created fixture dirs under $UM_VAULT_DIR are 0777
      # and the container's node user (UID 1000) can create its own subdirs
      # (e.g. /vault/state/t10e for memory_checkpoint writes). Without this,
      # runner-owned 0755 state/ dir blocks container mkdir with EACCES.
      # v0.6 follow-up: set docker-compose user: to match host UID so this
      # cross-user write pattern isn't needed.
      - name: Run smoke test
        working-directory: server
        env:
          UM_MCP_WRITE_ENABLED: "true"
          UM_VAULT_DIR: "/tmp/um-vault-ci"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # v0.8: G2.5 mocked-SDK boot tests now isolated by per-provider
          # QDRANT_COLLECTION (boot_smoke_<provider>), so each boot lands its
          # DE5 stamp in its own collection — no stamp-mismatch when switching
          # providers across boots. UM_SKIP_BOOT_SMOKE remains the dev-side
          # escape hatch for running smoke without docker.
        run: |
          umask 000
          bash ./test/smoke.sh

      # Continuity pipeline test — runs BOTH mock + live modes so a mock-
      # scaffold regression (canned-response shape, JSON parsing, etc.) is
      # caught fast and cheap, before the live OpenAI run validates the
      # real API path. v0.6 R3 caught that mock-mode wasn't being exercised
      # in CI; this fix closes that gap.
      - name: Run continuity test (mock mode)
        working-directory: server
        env:
          UM_CONTINUITY_LIVE: "0"
          UM_ENDPOINT: http://localhost:6335
        run: bash ./test/continuity.sh

      # Live mode uses UM_CONTINUITY_LIVE=1 so the OpenAI summarizer path
      # runs for real. Adds ~1¢/run of API cost on top of mock — worth the
      # cross-section coverage of state.md round-trip with real LLM output
      # variability. See issue #7.
      - name: Run continuity test (live OpenAI)
        working-directory: server
        env:
          UM_CONTINUITY_LIVE: "1"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          UM_ENDPOINT: http://localhost:6335
        run: bash ./test/continuity.sh

      - name: Dump logs on failure
        if: failure()
        working-directory: server
        run: |
          echo "::group::memory-server logs"
          docker compose logs memory-server || true
          echo "::endgroup::"
          echo "::group::qdrant logs"
          docker compose logs qdrant || true
          echo "::endgroup::"

      - name: Teardown
        if: always()
        working-directory: server
        run: docker compose down --volumes || true

  installer-test:
    name: Installer cross-platform (${{ matrix.os }})
    needs: [smoke]
    # Mirror the skip-on-fork pattern from the smoke job above.
    if: >-
      github.event_name == 'push' ||
      github.event.pull_request.head.repo.full_name == github.repository
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      # --severity=warning catches real warnings (unused vars, quote issues,
      # shadowed assignments) while filtering info/style noise (useless-echo,
      # ls-vs-find, A&&B||C patterns). Info/style findings remaining after
      # the v0.5 installer refactor are tracked as a v0.6 follow-up — see
      # ROADMAP. Warnings MUST pass: each one is either a real bug, or
      # explicitly annotated with a shellcheck directive explaining why.
      - name: Run shellcheck
        run: |
          sudo apt-get install -y shellcheck 2>/dev/null || brew install shellcheck
          shellcheck --severity=warning \
                     installer/*.sh installer/lib/*.sh \
                     plugins/claude-code/universal-memory/bin/um \
                     plugins/claude-code/universal-memory/bin/um-capture \
                     plugins/claude-code/universal-memory/bin/um-forget \
                     plugins/claude-code/universal-memory/bin/um-preview \
                     plugins/claude-code/universal-memory/bin/um-supersede \
                     plugins/claude-code/universal-memory/bin/um-tunnel \
                     plugins/claude-code/universal-memory/hooks/*.sh \
                     plugins/claude-code/universal-memory/hooks/lib/*.sh
      # macOS runners don't ship pyyaml; install-cli.sh preflight checks for it.
      # ubuntu-latest has python3-yaml out of the box; skip on Linux.
      - name: Ensure pyyaml (macOS)
        if: matrix.os == 'macos-latest'
        run: pip3 install --break-system-packages pyyaml 2>/dev/null || pip3 install pyyaml
      # Sandbox tests first
      - run: bash installer/install-cli.test.sh
      - run: bash server/install.test.sh
      # install-token.test.sh exercises the v0.6 token-generation +
      # preservation contract (B.4) plus the v0.6-key snapshot at
      # install.sh:585-602. v0.6 R3 caught that this script was being
      # shellchecked but never run end-to-end — closing that gap here.
      - run: bash installer/install-token.test.sh
      # install-plugin-cc.test.sh covers the standalone Claude Code plugin
      # installer, including T17's v0.4-class stale-symlink-replacement
      # regression guard (issue #22). Was previously shellchecked but never
      # executed in CI — same gap class as install-token.test.sh in v0.6 R3.
      # The companion install-plugin-codex.test.sh has the same gap and
      # will be wired separately.
      - run: bash installer/install-plugin-cc.test.sh
      # Real-install leg — validates end-to-end
      - name: Real install + um --version sanity
        run: |
          bash installer/install-cli.sh --yes
          export PATH="$HOME/.local/bin:$PATH"
          which um
          um --version
        env:
          HOME: ${{ runner.temp }}/um-real-install
