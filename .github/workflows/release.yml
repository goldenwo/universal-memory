name: release

# Trigger only on semver tag push (v0.1.2, v1.0.0-rc.1, etc.).
# We don't run on main pushes — only tags produce images.
on:
  push:
    tags: ['v*.*.*']

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # don't cancel a release build mid-way

permissions:
  packages: write     # needed to push to GHCR

jobs:
  image:
    name: build + push multi-arch image
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags + labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/goldenwo/universal-memory-server
          # v0.1.2 -> tags: 0.1.2, 0.1, latest (prereleases skip latest)
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v7
        with:
          context: server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GHA-native build cache — speeds up subsequent releases.
          # Note: GHA cache is keyed per-platform; multi-arch cache
          # may miss for one arch while hitting the other. That's
          # acceptable for v0.1.
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # NOTE: `install-cli.sh` was previously uploaded as a release asset for
      # curl|bash install flows. That URL is unusable because the script needs
      # the full repo layout (lib + bin files) and `${BASH_SOURCE[0]}` is empty
      # when bash reads from stdin — so a single-file curl|bash install never
      # worked. Docs pivoted to `git clone + bash installer/install-cli.sh` in
      # commit 267ba27 (v0.4-alpha). Asset upload removed here to stop shipping
      # a broken curl|bash vector. Re-add with genuine self-bootstrap support
      # (tarball + stdin-detecting bootstrap) if/when that's worth the lift.
