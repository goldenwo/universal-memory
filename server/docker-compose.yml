name: universal-memory

services:
  qdrant:
    # v0.8 G2 — bump to 1.13.0 to match @qdrant/js-client-rest@1.13.0 pulled
    # transitively by mem0ai 2.4.6 (see server/package.json). Mismatched minor
    # versions (1.11 ↔ 1.13) emit a runtime warning per qdrant client; bumping
    # the server eliminates the warning and any future filter-syntax drift.
    image: qdrant/qdrant:v1.13.0
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage
    # Loopback-only host port so:
    #   (a) local devs can introspect their qdrant via curl/mcp without
    #       docker exec gymnastics
    #   (b) the v0.8 G2 add-stamp-roundtrip integration test (CI-runnable
    #       without API keys) can reach qdrant from the runner
    # Production deployments override via UM_QDRANT_PORT (or omit by
    # docker-compose override if external exposure is undesired).
    ports:
      - "${UM_QDRANT_PORT:-127.0.0.1:6333}:6333"

  memory-server:
    build: .
    image: universal-memory-server:0.7.0-alpha
    restart: unless-stopped
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      UM_VAULT_DIR: /vault
    # UM_CONTAINER_USER lets CI / automated setups pin the container UID:GID
    # to match the host user so files written into the rw-mounted vault are
    # owned by the host user (avoids cross-user cleanup EACCES). Defaults to
    # "node" (UID 1000 in the node:alpine base image) for production.
    #
    # Format: literal "node" OR a numeric <uid>:<gid> pair (both >0). install.sh
    # rejects root (0:0) — combined with UM_MOUNT_MODE=rw, root inside the
    # container writes root-owned files into the host vault. Pin it ONCE on
    # first `docker compose up` and don't change it mid-lifecycle; changing
    # the UID causes mixed ownership that blocks later overwrites (EACCES).
    # For CI / local rw-mount installs, use "$(id -u):$(id -g)".
    user: "${UM_CONTAINER_USER:-node}"
    volumes:
      - ${UM_VAULT_DIR}:/vault:${UM_MOUNT_MODE:-ro}
      # Optional: persist mem0's history DB across container restarts.
      # Default MEM0_HISTORY_DB_PATH is /tmp/mem0-history.db — ephemeral,
      # cleared every restart. To keep mem0's edit/dedup history, uncomment
      # the next line AND set MEM0_HISTORY_DB_PATH=/var/lib/mem0/history.db
      # in .env. Host path './data/mem0-history' is created on first up.
      # - ./data/mem0-history:/var/lib/mem0
    ports:
      - "${MEM0_MCP_PORT:-127.0.0.1:6335}:6335"
    depends_on:
      - qdrant
