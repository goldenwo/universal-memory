name: universal-memory

services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    restart: unless-stopped
    volumes:
      - ./data/qdrant:/qdrant/storage

  memory-server:
    build: .
    image: universal-memory-server:0.2.1
    restart: unless-stopped
    env_file: .env
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      UM_VAULT_DIR: /vault
    volumes:
      - ${UM_VAULT_DIR}:/vault:${UM_MOUNT_MODE:-ro}
    ports:
      - "${MEM0_MCP_PORT:-127.0.0.1:6335}:6335"
    depends_on:
      - qdrant
