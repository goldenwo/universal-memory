openapi: 3.1.0
info:
  title: universal-memory
  version: 1.5.2
  description: ChatGPT Custom GPT Actions surface for universal-memory. Trimmed
    subset of the full spec — only the 7 routes a Custom GPT needs (search,
    state, add, delete, recent, append-turn, checkpoint). Full spec at
    /openapi.yaml.
  license:
    name: MIT
    url: https://github.com/goldenwo/universal-memory/blob/main/LICENSE
servers:
  - url: http://localhost:6335
    description: universal-memory server (UM_PUBLIC_BASE_URL or localhost:6335)
paths:
  /api/search:
    post:
      operationId: memory_search
      summary: Semantic search
      description: POST body. Returns {results:[...]} compact by default; ?full=1 for
        full shape. Excludes superseded/deprecated/rejected and invalidated docs
        unless include_superseded=true. Optional filters.project/filters.type
        applied after recall.
      parameters:
        - name: full
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: "When true, return the full MemoryResult shape in each result
            instead of the compact CompactMemoryResult shape. The outer envelope
            (`{results: [...]}`) is the same either way."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: "Search succeeded. Response is `{results: [...]}`; items are
            compact (CompactMemoryResult) by default, or full (MemoryResult)
            when ?full=1."
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/SearchResponse"
                  - $ref: "#/components/schemas/SearchResponseFull"
        "400":
          description: Missing or invalid `query`
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/state/{project}:
    get:
      operationId: memory_state
      summary: Read state.md for a project
      description: "Direct vault read of `$VAULT/state/<project>/state.md`. Does NOT
        hit mem0. When the file does not exist, returns `{ ok: true, project,
        state: null, valid_from: null }` with status 200 (not 404)."
      parameters:
        - name: project
          in: path
          required: true
          schema:
            type: string
            pattern: ^[a-zA-Z0-9._-]+$
          description: Project slug. Must match ^[a-zA-Z0-9._-]+$.
      responses:
        "200":
          description: "State file contents (or `state: null` when the file does not exist
            for this project)"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateResponse"
        "400":
          description: Invalid project name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/add:
    post:
      operationId: memory_add
      summary: Extract facts and store via mem0
      description: Passes `text` through mem0's LLM fact extractor and persists the
        resulting atomic memories. Optional `metadata` is attached to every
        extracted fact.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddRequest"
      responses:
        "200":
          description: Facts extracted and stored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AddResponse"
  /api/delete:
    post:
      operationId: memory_delete
      summary: Delete by metadata.id or mem0 UUID
      description: "Two shapes — send exactly one of: `{ metadata: { id } }` to delete
        every entry matching metadata.id, or `{ id }` to delete one entry by
        mem0 UUID. Missing or both-present produces 400."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteRequest"
      responses:
        "200":
          description: Delete completed (may have deleted 0 entries)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResponse"
        "400":
          description: Invalid JSON, both shapes provided, or missing id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/recent/{project}:
    get:
      operationId: memory_recent
      summary: Most-recent memories for a project
      description: "Returns the N most-recently indexed memories for the given project
        slug. Response is `{results: [...]}` with compact items by default; add
        `?full=1` to get the full MemoryResult shape in each result instead.
        Results are sorted newest-first by updated_at."
      parameters:
        - name: project
          in: path
          required: true
          schema:
            type: string
            pattern: ^[a-zA-Z0-9._-]+$
          description: Project slug. Must match ^[a-zA-Z0-9._-]+$.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Max results to return. Clamped to [1, 100]; default 10.
        - name: full
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: "When true, return the full MemoryResult shape in each result
            instead of the compact CompactMemoryResult shape. The outer envelope
            (`{results: [...]}`) is the same either way."
      responses:
        "200":
          description: "Recent memories. Response is `{results: [...]}`; items are compact
            (CompactMemoryResult) by default, or full (MemoryResult) when
            ?full=1."
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/CompactSearchResponse"
                  - $ref: "#/components/schemas/SearchResponseFull"
        "400":
          description: Invalid project name
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/append-turn:
    post:
      operationId: memory_append_turn
      summary: Append a raw conversation turn to a project
      description: Writes a single turn (user/assistant/system) to
        captures/<project>/raw/<date>.md. Requires UM_MCP_WRITE_ENABLED=true.
        Parity with MCP tool memory_append_turn; feeds the session-summary
        pipeline on next checkpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AppendTurnRequest"
      responses:
        "200":
          description: Turn appended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppendTurnResponse"
        "400":
          description: Invalid request (bad slug, missing role, content too large)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Writes disabled (UM_MCP_WRITE_ENABLED not set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/checkpoint:
    post:
      operationId: memory_checkpoint
      summary: Force a session checkpoint (summary + state update)
      description: "Triggers a server-side checkpoint for the given project: reads
        capture logs, generates a session summary via LLM, and merges it into
        state.md. Requires UM_MCP_WRITE_ENABLED=true. Parity with MCP tool
        memory_checkpoint."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckpointRequest"
      responses:
        "200":
          description: Checkpoint completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckpointResponse"
        "400":
          description: Soft checkpoint failure (e.g. cost cap hit, invalid project,
            checkpoint in progress)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Writes disabled (UM_MCP_WRITE_ENABLED not set)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    SearchRequest:
      type: object
      required:
        - query
      additionalProperties: false
      properties:
        query:
          type: string
          description: Semantic search query (non-empty)
        limit:
          type: integer
          minimum: 1
          maximum: 100
          default: 5
          description: Max results. Clamped to [1, 100]; default 5.
        include_superseded:
          type: boolean
          default: false
          description: If true, return results regardless of status/invalidated_at.
            Default false (exclude superseded/deprecated/rejected and anything
            with invalidated_at).
        only_superseded:
          type: boolean
          default: false
          description: "Superseded-only listing: returns ONLY status=superseded records.
            Mode (a): with filters.lane/persona → restrict partition. Mode (b):
            no filters → all superseded across partitions. Wins over
            include_superseded when both set. Default limit 50."
        offset:
          type: integer
          minimum: 0
          default: 0
          description: Pagination offset for only_superseded listing (0-based). Ignored
            when only_superseded is false/absent.
        filters:
          $ref: "#/components/schemas/SearchFilters"
    SearchResponse:
      type: object
      description: "Default response shape for /api/search: `{results:
        [CompactMemoryResult]}`. Add ?full=1 to get the full MemoryResult shape
        in each result instead."
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/CompactMemoryResult"
    SearchResponseFull:
      type: object
      description: Full response shape for /api/search when ?full=1 is provided.
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/MemoryResult"
    ErrorResponse:
      type: object
      description: v0.6 unified error envelope (spec §5.1). Returned on every 4xx/5xx
        HTTP response from /api/* and inside the text content block of /mcp tool
        errors. The stable `error.code` uses one of the §5.2 prefix-groups
        (AUTH_*, INPUT_*, STATE_*, LIMIT_*, UPSTREAM_*, SERVER_*).
      properties:
        ok:
          type: boolean
          enum:
            - false
        error:
          type: object
          description: Structured error block per §5.1 wire format.
          properties:
            code:
              type: string
              description: Stable §5.2 error code (e.g. INPUT_INVALID, STATE_NOT_FOUND,
                UPSTREAM_FAILURE).
              pattern: ^(AUTH|INPUT|STATE|LIMIT|UPSTREAM|SERVER)_
            message:
              type: string
              description: Human-readable error message.
            retryable:
              type: boolean
              description: Hint for client retry policy. Retryable codes (LIMIT_RATE_EXCEEDED,
                STATE_LOCK_CONTENTION, UPSTREAM_FAILURE) are true; everything
                else is false.
          required:
            - code
            - message
            - retryable
      required:
        - ok
        - error
    StateResponse:
      type: object
      required:
        - ok
        - project
      properties:
        ok:
          type: boolean
          enum:
            - true
        project:
          type: string
        state:
          oneOf:
            - type: object
              required:
                - frontmatter
                - body
              properties:
                frontmatter:
                  type: object
                  additionalProperties: true
                body:
                  type: string
            - type: "null"
        valid_from:
          oneOf:
            - type: string
              format: date-time
            - type: "null"
    AddRequest:
      type: object
      required:
        - text
      additionalProperties: false
      properties:
        text:
          type: string
          description: Raw text to extract facts from and store.
        metadata:
          $ref: "#/components/schemas/MemoryMetadata"
    AddResponse:
      type: object
      description: Raw mem0 add() return shape. `results` is the list of
        extracted/upserted atomic facts.
      properties:
        results:
          type: array
          items:
            type: object
            additionalProperties: true
            properties:
              id:
                type: string
              memory:
                type: string
              event:
                type: string
                description: ADD | UPDATE | DELETE | NONE
    DeleteRequest:
      description: "Two shapes: A) `{ metadata: { id } }` to delete every mem0 entry
        whose metadata.id matches; B) `{ id }` to delete a single entry by mem0
        UUID."
      type: object
      properties:
        metadata:
          type: object
          required:
            - id
          properties:
            id:
              type: string
              minLength: 1
        id:
          type: string
          minLength: 1
          description: mem0 UUID
    DeleteResponse:
      type: object
      required:
        - ok
        - deleted
        - query
      properties:
        ok:
          type: boolean
          enum:
            - true
        deleted:
          type: integer
          minimum: 0
          description: Count of entries actually removed
        query:
          type: string
          description: Echo of the delete criterion, e.g. metadata.id=foo
    CompactSearchResponse:
      type: object
      description: Default search/list/recent response envelope with compact items.
        Use ?full=1 to get the full MemoryResult shape in each result instead.
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/CompactMemoryResult"
    AppendTurnRequest:
      type: object
      required:
        - project
        - content
        - role
      additionalProperties: false
      properties:
        project:
          type: string
          pattern: ^[a-zA-Z0-9._-]+$
          description: Project slug. Must match ^[a-zA-Z0-9._-]+$.
        content:
          type: string
          maxLength: 8192
          description: Turn content (max 8 192 chars).
        role:
          type: string
          enum:
            - user
            - assistant
            - system
          description: Speaker role.
        timestamp:
          type: string
          format: date-time
          description: ISO 8601 timestamp. Defaults to server clock when omitted.
        conversation_id:
          type: string
          description: Optional conversation identifier stored in the turn header.
    AppendTurnResponse:
      type: object
      required:
        - schema_version
        - ok
        - path
        - appended
        - bytes_written
      properties:
        schema_version:
          type: integer
          enum:
            - 1
        ok:
          type: boolean
          enum:
            - true
        path:
          type: string
          description: Vault-relative path written, e.g. captures/<project>/raw/<date>.md
        appended:
          type: boolean
          enum:
            - true
        bytes_written:
          type: integer
          minimum: 0
          description: Bytes appended to the file
    CheckpointRequest:
      type: object
      additionalProperties: false
      properties:
        project:
          type: string
          pattern: ^[a-zA-Z0-9._-]+$
          description: Project slug to checkpoint. Must match ^[a-zA-Z0-9._-]+$.
        since:
          type: string
          format: date-time
          description: ISO 8601 start of capture window (inclusive). Defaults to all
            captures.
        until:
          type: string
          format: date-time
          description: ISO 8601 end of capture window (inclusive). Defaults to now.
        skip_state_merge:
          type: boolean
          default: false
          description: When true, produce a summary but skip the state.md merge step.
    CheckpointResponse:
      description: Result of a successful checkpoint (ok:true) or soft failure (ok:false).
      oneOf:
        - type: object
          title: CheckpointSuccess
          required:
            - schema_version
            - ok
            - summary_id
            - summary_path
            - state_updated
            - cost_usd
            - tokens_in
            - tokens_out
            - duration_ms
          properties:
            schema_version:
              type: integer
              enum:
                - 1
            ok:
              type: boolean
              enum:
                - true
            summary_id:
              type: string
              description: Filename stem of the written session summary
            summary_path:
              type: string
              description: Vault-relative path of the written session summary
            state_updated:
              type: boolean
              description: Whether state.md was updated
            state_path:
              oneOf:
                - type: string
                - type: "null"
              description: Vault-relative path of state.md, or null when skip_state_merge=true
            cost_usd:
              type: number
              description: Total LLM cost in USD for this checkpoint
            tokens_in:
              type: integer
              description: Total input tokens consumed
            tokens_out:
              type: integer
              description: Total output tokens produced
            duration_ms:
              type: integer
              minimum: 0
              description: Wall-clock duration in milliseconds
        - type: object
          title: CheckpointFailure
          description: "v0.6 §5.1 unified envelope — see ErrorResponse schema. Stable
            codes for /api/checkpoint failures: UPSTREAM_FAILURE (502),
            STATE_LOCK_CONTENTION (503), INPUT_INVALID (400)."
          required:
            - ok
            - error
          properties:
            ok:
              type: boolean
              enum:
                - false
            error:
              type: object
              properties:
                code:
                  type: string
                  pattern: ^(AUTH|INPUT|STATE|LIMIT|UPSTREAM|SERVER)_
                message:
                  type: string
                retryable:
                  type: boolean
              required:
                - code
                - message
                - retryable
    SearchFilters:
      type: object
      description: Optional post-filters applied after mem0 recall.
      additionalProperties: false
      properties:
        project:
          type: string
          description: Keep only results whose metadata.project matches
        type:
          type: string
          description: Keep only results whose metadata.type matches
    CompactMemoryResult:
      type: object
      description: Compact memory record returned by default (without ?full=1) from
        search, list, and recent endpoints. Contains only the most commonly
        needed fields. Use ?full=1 to get the full MemoryResult shape.
      required:
        - id
        - title
        - snippet
      properties:
        id:
          type: string
          description: Filename stem from metadata.id when present; falls back to mem0
            UUID only when metadata.id is absent
        title:
          type: string
          description: Document title from metadata.title
        snippet:
          type: string
          description: Short text excerpt from the stored memory body
        score:
          type: number
          description: Optional relevance score (present on search results; absent on
            list/recent). When UM_TEMPORAL_DECAY=true this is the decayed score.
    MemoryResult:
      type: object
      description: A single memory record returned by search/list endpoints (full
        shape, ?full=1).
      properties:
        id:
          type: string
          description: Filename stem from metadata.id when present; falls back to mem0
            UUID only when metadata.id is absent
        memory:
          type: string
          description: The stored text
        score:
          type: number
          description: Relevance score. When UM_TEMPORAL_DECAY=true this is the decayed
            score (original * exp(-age/halfLife)).
        metadata:
          $ref: "#/components/schemas/MemoryMetadata"
        hash:
          type: string
        created_at:
          type:
            - string
            - "null"
        updated_at:
          type:
            - string
            - "null"
        user_id:
          type: string
          description: "Snake-case field name as returned by the mem0 library API
            (application layer). Note: the underlying Qdrant payload stores this
            as camelCase `userId` per spec §4.3 — mem0 normalises it back to
            snake_case in getAll()/search() results."
    MemoryMetadata:
      type: object
      description: Arbitrary metadata attached to a mem0 document. Fields follow UM
        vault frontmatter conventions. All fields are optional; callers may add
        custom keys.
      additionalProperties: true
      properties:
        schema_version:
          type: integer
          description: UM metadata schema version (always 1 in v0.3)
        type:
          type: string
          description: Document type (e.g. session_summary, authored, state, adr)
        id:
          type: string
          description: Stable document id — filename stem without .md. Must match
            ^[a-zA-Z0-9._-]+$.
        title:
          type: string
        project:
          type: string
          description: Owning project slug (matches ^[a-zA-Z0-9._-]+$)
        status:
          type: string
          enum:
            - current
            - superseded
            - deprecated
            - rejected
          description: Document lifecycle state. Search excludes
            superseded/deprecated/rejected by default.
        valid_from:
          type: string
          format: date-time
        invalidated_at:
          type:
            - string
            - "null"
          format: date-time
          description: When set, the doc is filtered out of search by default.
        superseded_by:
          type: string
        supersedes:
          type: array
          items:
            type: string
